<!-- 
  PENTING:
  - Di genre.html gunakan: data-page="genre-list" data-archive-type="genre"
  - Di Artist.html gunakan: data-page="artist-list" data-archive-type="artist"
  - Di country.html gunakan: data-page="country-list" data-archive-type="country"
-->
<script>
    const params = new URLSearchParams(window.location.search);
    const mode = params.has('name') ? 'archive' : 'country-list'; // Ganti genre-list sesuai file
    document.write(`<body data-page="${mode}" data-archive-type="country">`); 
</script>

    <header>
        <div class="nav-left">
            <div class="hamburger" id="menu-btn"><i class="fas fa-bars"></i></div>

        </div>
        <nav class="menu-nav" id="menu-nav">
            <a href="index.html">Home</a> <a href="a-z-list.html">A-Z</a>
        </nav>
    </header>

    <div class="detail-container">
        <h2 id="archive-title">Explore</h2>
        
        <!-- Wadah untuk Daftar (Genre/Artist/Country) dengan angka counter -->
        <div id="list-container" class="list-wrapper"></div>

        <!-- Wadah untuk Grid Video (muncul setelah salah satu list diklik) -->
        <div id="post-grid" class="post-grid"></div>
    </div>

    <script src="js/main.js"></script>
