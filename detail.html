<!DOCTYPE html>
<html lang="id">
<head>
    <title>Loading... - Yorunosekai</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Yorunosekai - Platform Streaming Terlengkap dan Responsif.">
    <meta name="keywords" content="streaming, video, yorunosekai, nonton online">
    <meta name="author" content="Yorunosekai Admin">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Yorunosekai Streaming">
    <meta property="og:description" content="Nonton streaming video terbaru dengan kualitas HD.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body data-page="detail">

    <!-- Header Sama dengan Index -->
    <header>
    <div class="nav-left">
        <div class="hamburger" id="menu-btn"><i class="fas fa-bars"></i></div>
        <a href="index.html" class="logo">YORUNOSEKAI</a>
    </div>
    
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Cari kode atau judul...">
    </div>

    <div class="nav-right">
        <button class="btn-toggle" onclick="toggleNSFW()" title="Toggle SFW/NSFW"><i class="fas fa-eye-slash"></i></button>
        <button class="btn-toggle" onclick="toggleTheme()" title="Toggle Dark/Light"><i class="fas fa-moon"></i></button>
    </div>

    <!-- Mobile Navigation -->
    <nav class="menu-nav" id="menu-nav">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="a-z-list.html"><i class="fas fa-sort-alpha-down"></i> A-Z List</a>
        <a href="genre.html"><i class="fas fa-tags"></i> Genres</a>
        <a href="Artist.html"><i class="fas fa-star"></i> Artists</a>
        <a href="country.html"><i class="fas fa-globe"></i> Countries</a>
    </nav>
    </header>

    <div class="detail-container">
        <div class="video-wrapper">
            <iframe id="video-player" src="" frameborder="0" allowfullscreen></iframe>
        </div>

        <h1 class="post-header-title" id="post-title">Loading...</h1>
        
        <div class="meta-info-table">
            <div class="meta-row">
                <div class="meta-label">Release:</div>
                <div class="meta-value" id="val-release">-</div>
            </div>
            <div class="meta-row">
                <div class="meta-label">Stars:</div>
                <div class="meta-value" id="val-stars">-</div>
            </div>
            <div class="meta-row">
                <div class="meta-label">Duration:</div>
                <div class="meta-value" id="val-duration">-</div>
            </div>
            <div class="meta-row">
                <div class="meta-label">Country:</div>
                <div class="meta-value" id="val-country">-</div>
            </div>
            <div class="meta-row" style="border:none">
                <div class="meta-label">Genre:</div>
                <div class="meta-value" id="val-genres">-</div>
            </div>
        </div>

        <div style="margin-top:20px;">
            <h3>Description:</h3>
            <p id="post-desc" style="color:var(--text-muted); font-size:14px;"></p>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
