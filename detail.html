<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Detail - Yorunosekai</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body data-page="detail">

    <!-- Gunakan Header yang sama dengan index.html -->
    <header>
        <div class="nav-left">
            <div class="hamburger" id="menu-btn"><i class="fas fa-bars"></i></div>
            <a href="index.html" class="logo">YORUNOSEKAI</a>
        </div>
        <div class="nav-right">
            <button class="btn-toggle" onclick="toggleTheme()"><i class="fas fa-adjust"></i></button>
        </div>
        <nav class="menu-nav" id="menu-nav">
            <a href="index.html">Home</a> <a href="genre.html">Genre</a>
        </nav>
    </header>

    <div class="detail-container">
        <div class="video-wrapper">
            <iframe id="video-player" src="" frameborder="0" allowfullscreen></iframe>
        </div>

        <h1 class="post-header-title" id="post-title">Loading...</h1>
        
        <div class="meta-info-table">
            <div class="meta-row">
                <div class="meta-label">Release:</div>
                <div class="meta-value" id="val-release">-</div>
            </div>
            <div class="meta-row">
                <div class="meta-label">Stars:</div>
                <div class="meta-value" id="val-stars">-</div>
            </div>
            <div class="meta-row">
                <div class="meta-label">Duration:</div>
                <div class="meta-value" id="val-duration">-</div>
            </div>
            <div class="meta-row">
                <div class="meta-label">Country:</div>
                <div class="meta-value" id="val-country">-</div>
            </div>
            <div class="meta-row" style="border:none">
                <div class="meta-label">Genre:</div>
                <div class="meta-value" id="val-genres">-</div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
