<!DOCTYPE html>
<html lang="id">
<head>
    <title>Loading... - Yorunosekai</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body data-page="detail">

    <!-- Header Sama dengan Index -->

    <div class="detail-container">
        <div class="video-wrapper">
            <iframe id="video-player" src="" frameborder="0" allowfullscreen></iframe>
        </div>

        <h1 class="post-header-title" id="post-title">Loading...</h1>
        
        <div class="meta-info-table">
            <div class="meta-row">
                <div class="meta-label">Release:</div>
                <div class="meta-value" id="val-release">-</div>
            </div>
            <div class="meta-row">
                <div class="meta-label">Stars:</div>
                <div class="meta-value" id="val-stars">-</div>
            </div>
            <div class="meta-row">
                <div class="meta-label">Duration:</div>
                <div class="meta-value" id="val-duration">-</div>
            </div>
            <div class="meta-row">
                <div class="meta-label">Country:</div>
                <div class="meta-value" id="val-country">-</div>
            </div>
            <div class="meta-row" style="border:none">
                <div class="meta-label">Genre:</div>
                <div class="meta-value" id="val-genres">-</div>
            </div>
        </div>

        <div style="margin-top:20px;">
            <h3>Description:</h3>
            <p id="post-desc" style="color:var(--text-muted); font-size:14px;"></p>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
